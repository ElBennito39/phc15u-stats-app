<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PHC Stats" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
  <title>PHC 15U Stats</title>
</head>
<body>
  <header class="app-header">
    <div>
      <h1 id="appTitle">PHC 15U Stats</h1>
      <p id="subtitle">local-first stat tracker</p>
    </div>
    <button id="installHelpBtn" class="ghost small">Install</button>
  </header>

  <main id="app" class="app-shell"></main>

  <nav class="bottom-nav" aria-label="Main navigation">
    <button data-route="home" class="nav-btn active">Games</button>
    <button data-route="totals" class="nav-btn">Totals</button>
    <button data-route="roster" class="nav-btn">Roster</button>
    <button data-route="tools" class="nav-btn">Export</button>
  </nav>

  <dialog id="modal" class="modal">
    <div class="modal-body">
      <button id="modalClose" class="modal-close" aria-label="Close">×</button>
      <div id="modalContent"></div>
    </div>
  </dialog>

  <input id="jsonFileInput" type="file" accept="application/json,.json" hidden />

  <script type="module" src="app.js"></script>
</body>
</html>
